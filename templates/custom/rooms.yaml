  name: FLUX Runtime Lab
  npc:
    greeting: Welcome to the FLUX lab. I track opcode compatibility across runtimes.
      What are you working on?
    name: Shim
    personality: 'You are Shim, a precise bytecode VM specialist. You track opcode

      mappings across Python, Rust, and C runtimes. You flag incompatibilities

      precisely — always cite opcode numbers and ISA sections. You know the

      difference between canonical paths and shortcut translations.

      Reference [ISA-v3] for specification questions and [ConformanceVectors]

      for test coverage.

      '
  room_id: flux_runtime
  seed_tiles:
  - answer: '[ISA-v3] key opcodes: HALT=0x00, NOP=0x01, LOAD=0x40, STORE=0x41, JMP=0x50,
      JZ=0x51, CALL=0x53, RET=0x54.

      Extension prefix: 0xFF → TEMPORAL=0x01, SECURITY=0x02, ASYNC=0x03.

      PUSH takes 32-bit signed immediate. LOAD/STORE use 16-bit addresses.

      See [ConformanceVectors] for full mapping and [OpcodeShim] for cross-runtime
      translation.

      '
    question: What are the ISA v3 opcode numberings?
    source: system
    tags:
    - isa
    - opcodes
    - specification
  - answer: '[OpcodeShim] Property-based tests (test_property_shim.py) found that
      python_to_rust()

      produces different results than the canonical path rust_to_canonical(python_to_canonical(bc)).

      Affected opcodes: FADD (0x43→0x44 direct, 0x2F via canonical) and TELL (0x60→0x83
      direct, 0xFE via canonical).

      Root cause: alias chain conflicts in _build_translation_table — MOV (0x21) aliases
      overwrite FADD''s canonical mapping.

      Fix: review lines 127-153 of canonical_opcode_shim.py.

      '
    question: What was the transitivity bug in canonical_opcode_shim.py?
    source: system
    tags:
    - bug
    - shim
    - conformance
    - opcode
  - answer: '[ConformanceVectors] flux-conformance: 74/74 validator+shim tests passing
      (as of Datum Session 12).

      Reference interpreter (ability-transfer): 56 opcodes, 8 correctness verification
      tests passing.

      Property-based tests: 46 tests (45 pass, 1 exposes the transitivity bug).

      Next priority: extension opcode conformance vectors for TEMPORAL, SECURITY,
      ASYNC.

      '
    question: What is the current conformance test status?
    source: system
    tags:
    - conformance
    - testing
    - status
  theme: engineering
- description: 'The conformance testing room. Tracks test vectors, pass/fail rates
    across

    runtimes, and the gap between specification and implementation.

    Datum (Super Z) is the primary contributor here.

    '
  name: ISA v3 Conformance Suite
  npc:
    greeting: Conformance suite loaded. 74/74 passing. What needs verification?
    name: Datum
    personality: 'You are Datum, a meticulous conformance engineer. You track test
      vectors

      with precision. When reporting status, always include exact numbers

      (e.g. "74/74 tests passing"). You know the difference between a spec

      bug and an implementation bug. Reference [ConformanceVectors] and

      [ISA-v3] constantly.

      '
  room_id: isa_v3_conformance
  seed_tiles:
  - answer: '[ConformanceVectors] Three categories:

      1. Validator tests — bytecode format validation, control flow analysis, jump
      target bounds

      2. Shim tests — cross-runtime translation: python↔canonical↔rust

      3. Property tests — mathematical properties: NOP universality, idempotence,
      round-trip identity, transitivity

      Total: 74 validator+shim + 46 property = 120 tests. 119 pass, 1 exposes real
      bug.

      '
    question: What conformance vectors exist?
    source: system
    tags:
    - conformance
    - vectors
    - testing
  - answer: '[ISA-v3] Extension prefix 0xFF dispatches to three namespaces:

      TEMPORAL (0xFF 0x01): FUEL_CHECK, DEADLINE_BEFORE, YIELD_IF_CONTENTION, PERSIST_CRITICAL,
      TIME_NOW, SLEEP_UNTIL

      SECURITY (0xFF 0x02): CAP_INVOKE, MEM_TAG, SANDBOX_ENTER, SANDBOX_EXIT, FUEL_SET,
      IDENTITY_GET

      ASYNC (0xFF 0x03): SUSPEND, RESUME, FORK, JOIN, CANCEL, AWAIT_CHANNEL

      No conformance vectors exist yet for extensions — this is the gap.

      '
    question: What are the extension opcodes?
    source: system
    tags:
    - isa
    - extensions
    - temporal
    - security
    - async
