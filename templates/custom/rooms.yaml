  - answer: 'Both cause pain and swelling. Signs suggesting fracture: inability to
      bear weight, visible deformity, numbness/tingling, bone protruding. Signs suggesting
      sprain: can bear some weight, swelling without deformity, pain with movement
      but not at rest. When in doubt, get an X-ray. RICE protocol (Rest, Ice, Compression,
      Elevation) helps both in the first 48 hours.'
